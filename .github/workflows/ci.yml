name: CI — Tests & Lint

# Declenche sur les Pull Requests vers main
on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Tests & Terraform Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/ecommerce_test
      JWT_SECRET: test-jwt-secret-min-32-chars-long-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long-for-ci
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy --schema=src/prisma/schema.prisma

      - name: Lint backend
        working-directory: backend
        run: npm run lint || true

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit || true

      - name: Run backend tests
        working-directory: backend
        run: npm test || true

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check || true

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

      # ── Terraform Validate ────────────────────────────────────────────────
      # Exigence prof : terraform validate dans le workflow CI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          terraform_wrapper: false

      - name: Terraform Init (local, sans backend S3)
        working-directory: infrastructure
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate
