name: Redeploy — Quick Recovery

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker image rebuild (use existing images)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_environment: dev
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_app_name: ecommerce
  TF_VAR_db_name: ecommerce_dev
  TF_VAR_db_username: ecommerceadmin
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_backend_image: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest
  TF_VAR_frontend_image: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
  TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
  TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
  TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 — (Optional) Rebuild and push Docker images
  # ═══════════════════════════════════════════════════════════════════════════
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest
          echo "✅ Backend image pushed"

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:${{ github.sha }}
          echo "✅ Frontend image pushed"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 — Terraform: recreate infrastructure
  # ═══════════════════════════════════════════════════════════════════════════
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-push
    if: always() && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    outputs:
      alb_dns: ${{ steps.tf-output.outputs.alb_dns }}
      cloudfront_domain: ${{ steps.tf-output.outputs.cloudfront_domain }}
      ec2_ip: ${{ steps.tf-output.outputs.ec2_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create Terraform state bucket (if not exists)
        run: |
          BUCKET="ecommerce-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          if ! aws s3 ls "s3://$BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$BUCKET" --region ${{ secrets.AWS_REGION }}
            echo "✅ State bucket created: $BUCKET"
          else
            echo "✅ State bucket already exists: $BUCKET"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          rm -f terraform.tfstate terraform.tfstate.backup .terraform.lock.hcl
          rm -rf .terraform
          terraform init \
            -backend-config="bucket=ecommerce-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=state/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Remove S3 buckets from Terraform State
        working-directory: infrastructure
        run: |
          # Remove old aws_s3_bucket resources from state so Terraform stops trying to refresh them
          terraform state rm "module.s3.aws_s3_bucket.assets" || true
          terraform state rm "module.s3.aws_s3_bucket.static" || true
          terraform state rm "module.s3.aws_s3_bucket_public_access_block.assets" || true
          terraform state rm "module.s3.aws_s3_bucket_public_access_block.static" || true
          terraform state rm "module.s3.aws_s3_bucket_cors_configuration.assets" || true

      - name: Terraform Plan
        working-directory: infrastructure
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: infrastructure
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          CF_DOMAIN=$(terraform output -raw cloudfront_domain 2>/dev/null || echo "")
          EC2_IP=$(terraform output -raw ec2_public_ip 2>/dev/null || echo "")
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$CF_DOMAIN" >> $GITHUB_OUTPUT
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT

          echo "══════════════════════════════════════════════"
